services:
  frontend:
    container_name: 'react'
    build: src/client
    networks:
      - geo-net
    environment:
      API_PROXY_TARGET: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    container_name: 'django'
    build: src/server
    networks:
      - geo-net
    env_file:
      - .env
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  database:
    container_name: 'postGIS'
    platform: linux/x86_64
    build: .
    image: geo-track-postgis:14-3.5
    restart: always
    networks:
      - geo-net
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/15-init-locations.sql:/docker-entrypoint-initdb.d/15-init-locations.sql:ro
      - ./scripts/20-load-dem.sh:/docker-entrypoint-initdb.d/20-load-dem.sh:ro
      - ./dem:/dem:ro

